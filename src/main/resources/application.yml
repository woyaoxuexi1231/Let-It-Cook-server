# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 开启下划线转驼峰
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # 开启 SQL 日志
  global-config:
    db-config:
      id-type: auto  # 主键自增
      logic-delete-field: isDeleted  # 逻辑删除字段
      logic-delete-value: 1  # 已删除
      logic-not-delete-value: 0  # 未删除
